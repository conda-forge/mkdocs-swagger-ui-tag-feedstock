schema_version: 1

context:
  version: "0.8.1"

package:
  name: mkdocs-swagger-ui-tag
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mkdocs-swagger-ui-tag/mkdocs_swagger_ui_tag-${{ version }}.tar.gz
  sha256: 15f199ca7734c50c088c53bfe9ec806768ad97816badb3a4e72af4e9434252db

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - beautifulsoup4 >=4.13.3

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - mkdocs_swagger_ui_tag
      pip_check: true

about:
  summary: A MkDocs plugin supports for add Swagger UI in page.
  license: MIT AND Apache-2.0
  license_file:
    - LICENSE
    - mkdocs_swagger_ui_tag/swagger-ui/LICENSE
    - mkdocs_swagger_ui_tag/swagger-ui/NOTICE
  homepage: https://blueswen.github.io/mkdocs-swagger-ui-tag/
  repository: https://github.com/blueswen/mkdocs-swagger-ui-tag

extra:
  recipe-maintainers:
    - xhochy
